name: CI

# Run on PRs into main, and on pushes to any branch that isn't main.
# This gives branches fast feedback without re-running checks on the merge commit.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

# Minimum permissions needed to check out code.
permissions:
  contents: read

# Cancel older runs on the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
